<!DOCTYPE html>
<html lang="hi">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S K Pharmacy - ऑनलाइन स्टोर</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #f0f2f5; }
        header { background: #0046be; color: white; padding: 20px; text-align: center; }
        .share-btn-top { background: #febd69; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; margin: 10px; }
        .search-box { background: #232f3e; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 1000; }
        .search-box input { width: 80%; padding: 12px; border-radius: 25px; border: none; outline: none; }
        .container { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .product-card { background: white; border-radius: 12px; padding: 15px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .product-card img { width: 100%; height: 120px; object-fit: contain; border-radius: 8px; }
        .price { color: #B12704; font-size: 18px; font-weight: bold; }
        .buy-btn { background: #ffd814; border: 1px solid #fcd200; padding: 10px; border-radius: 20px; width: 100%; font-weight: bold; cursor: pointer; }
        .footer { background: #131a22; color: white; padding: 30px; text-align: center; }
        .social-links a { color: white; font-size: 28px; margin: 0 15px; text-decoration: none; }
        .whatsapp-channel { display: inline-block; background: #25D366; color: white; padding: 12px 25px; border-radius: 30px; text-decoration: none; font-weight: bold; margin: 15px 0; }
    </style>
</head>
<body>

<header>
    <h1>S K Pharmacy</h1>
    <p>आपका स्वास्थ्य, हमारी जिम्मेदारी ❤️</p>
    <button class="share-btn-top" onclick="shareSite()"><i class="fas fa-share-alt"></i> वेबसाइट शेयर करें</button>
</header>

<div class="search-box">
    <input type="text" id="myInput" onkeyup="searchProduct()" placeholder="दवाई खोजें...">
</div>

<div class="container" id="productList">
    <div class="product-card">
        <img src="24449.jpg" alt="BP Machine">
        <h3>Digital BP Machine</h3>
        <p class="price">₹1,450</p>
        <button class="buy-btn" onclick="orderWA('Digital BP Machine')">WhatsApp ऑर्डर</button>
    </div>
    <div class="product-card">
        <img src="24450.jpg" alt="Weight Machine">
        <h3>Weight Machine</h3>
        <p class="price">₹850</p>
        <button class="buy-btn" onclick="orderWA('Weight Machine')">WhatsApp ऑर्डर</button>
    </div>
    <div class="product-card">
        <img src="24451.jpg" alt="Vasmol">
        <h3>Super Vasmol 33</h3>
        <p class="price">₹50</p>
        <button class="buy-btn" onclick="orderWA('Super Vasmol 33')">WhatsApp ऑर्डर</button>
    </div>
</div>

<div class="footer">
    <div class="social-links">
        <a href="https://www.instagram.com/sakirkhangrnoida" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="https://www.facebook.com/share/1DyfvHEuB5/" target="_blank"><i class="fab fa-facebook"></i></a>
    </div>
    <a href="https://whatsapp.com/channel/0029VbBhlzk5Ui2STrfHQf43" class="whatsapp-channel" target="_blank">
        <i class="fab fa-whatsapp"></i> व्हाट्सएप चैनल फॉलो करें
    </a>
    <p>संपर्क: 7983006957 | 9258751739</p>
</div>

<script>
function searchProduct() {
    var input = document.getElementById("myInput");
    var filter = input.value.toUpperCase();
    var cards = document.getElementsByClassName("product-card");
    for (var i = 0; i < cards.length; i++) {
        var title = cards[i].getElementsByTagName("h3")[0];
        if (title.innerText.toUpperCase().indexOf(filter) > -1) {
            cards[i].style.display = "";
        } else {
            cards[i].style.display = "none";
        }
    }
}
function shareSite() {
    if (navigator.share) {
        navigator.share({ title: 'S K Pharmacy', url: window.location.href });
    } else {
        alert("लिंक कॉपी करें: " + window.location.href);
    }
}
function orderWA(pname) {
    window.open("https://wa.me/919258751739?text=नमस्ते, मुझे " + pname + " चाहिए।");
}
</script>

</body>
</html>
