 <!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S K Pharmacy - ऑनलाइन स्टोर</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #f0f2f5; color: #1a1a1a; }
        header { background: #0046be; color: white; padding: 25px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .search-box { background: #232f3e; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 1000; }
        .search-box input { width: 85%; max-width: 500px; padding: 12px 20px; border-radius: 25px; border: none; outline: none; font-size: 16px; }
        .container { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; max-width: 1200px; margin: auto; }
        .product-card { background: white; border-radius: 12px; padding: 15px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border: 1px solid #eee; }
        .product-card h3 { font-size: 15px; margin: 10px 0; color: #333; height: 40px; overflow: hidden; }
        .price { color: #B12704; font-size: 18px; font-weight: bold; margin-bottom: 12px; }
        .buy-btn { background: #ffd814; border: 1px solid #fcd200; padding: 10px; border-radius: 20px; cursor: pointer; width: 100%; font-weight: bold; }
        .footer { background: #131a22; color: white; padding: 30px 20px; text-align: center; margin-top: 30px; }
        .social-links a { color: white; font-size: 28px; margin: 0 15px; text-decoration: none; }
        .whatsapp-channel { display: inline-block; background: #25D366; color: white; padding: 12px 25px; border-radius: 30px; text-decoration: none; font-weight: bold; margin: 15px 0; }
    </style>
</head>
<body>

<header>
    <h1>S K Pharmacy</h1>
    <p>आपका स्वास्थ्य, हमारी जिम्मेदारी ❤️</p>
</header>

<div class="search-box">
    <input type="text" id="myInput" onkeyup="searchProduct()" placeholder="प्रोडक्ट खोजें (Vasmol, BP Machine...)...">
</div>

<div class="container" id="productList">
    <div class="product-card">
        <h3>Super Vasmol 33 Kesh Kala</h3>
        <p class="price">₹50</p>
        <button class="buy-btn" onclick="orderWA('Super Vasmol 33')">WhatsApp ऑर्डर</button>
    </div>
    <div class="product-card">
        <h3>Digital BP Machine</h3>
        <p class="price">₹1,450</p>
        <button class="buy-btn" onclick="orderWA('BP Machine')">WhatsApp ऑर्डर</button>
    </div>
    <div class="product-card">
        <h3>Digital Weight Machine</h3>
        <p class="price">₹850</p>
        <button class="buy-btn" onclick="orderWA('Weight Machine')">WhatsApp ऑर्डर</button>
    </div>
    <div class="product-card">
        <h3>Vitamin Tablets</h3>
        <p class="price">₹199</p>
        <button class="buy-btn" onclick="orderWA('Vitamin Tablets')">WhatsApp ऑर्डर</button>
    </div>
    <div class="product-card">
        <h3>Pain Relief Oil</h3>
        <p class="price">₹120</p>
        <button class="buy-btn" onclick="orderWA('Pain Relief Oil')">WhatsApp ऑर्डर</button>
    </div>
</div>

<div class="footer">
    <div class="social-links">
        <a href="https://www.instagram.com/sakirkhangrnoida?igsh=MnVzemt4ZjRhcTBz" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="https://www.facebook.com/share/1DyfvHEuB5/" target="_blank"><i class="fab fa-facebook"></i></a>
    </div>
    <a href="https://whatsapp.com/channel/0029VbBhlzk5Ui2STrfHQf43" class="whatsapp-channel" target="_blank">
        <i class="fab fa-whatsapp"></i> व्हाट्सएप चैनल फॉलो करें
    </a>
    <div style="font-size: 13px; opacity: 0.8; margin-top: 15px;">
        <p>संपर्क: 7983006957 | 9258751739</p>
        <p>© 2026 S K Pharmacy</p>
    </div>
</div>

<script>
function searchProduct() {
    var input = document.getElementById("myInput");
    var filter = input.value.toUpperCase();
    var cards = document.getElementsByClassName("product-card");
    for (var i = 0; i < cards.length; i++) {
        var title = cards[i].getElementsByTagName("h3")[0];
        if (title.innerText.toUpperCase().indexOf(filter) > -1) {
            cards[i].style.display = "";
        } else {
            cards[i].style.display = "none";
        }
    }
}
function orderWA(pname) {
    window.open("https://wa.me/919258751739?text=" + encodeURIComponent("नमस्ते S K Pharmacy, मुझे " + pname + " ऑर्डर करना है।"), "_blank");
}
</script>

</body>
</html>
