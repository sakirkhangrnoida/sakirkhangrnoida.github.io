<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S K Pharmacy - Dr. Sakir Khan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --amazon-blue: #131921; --amazon-yellow: #febd69; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background-color: #e3e6e6; color: #333; }
        
        .header { background: var(--amazon-blue); color: white; padding: 10px; position: sticky; top: 0; z-index: 1000; }
        .search-container { padding: 5px 10px 10px; background: var(--amazon-blue); }
        .search-bar { display: flex; background: white; border-radius: 6px; overflow: hidden; }
        .search-bar input { flex: 1; border: none; padding: 12px; outline: none; }
        .search-bar button { background: var(--amazon-yellow); border: none; padding: 0 15px; cursor: pointer; }

        .cat-scroll { display: flex; overflow-x: auto; background: white; padding: 15px 5px; gap: 15px; border-bottom: 1px solid #ddd; }
        .cat-item { text-align: center; min-width: 75px; flex-shrink: 0; }
        .cat-icon { background: #f0f2f2; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 5px; color: var(--amazon-blue); font-size: 20px; }
        .cat-item span { font-size: 11px; font-weight: bold; }

        /* फोटो फ्रेमिंग - फोटो घेरने का ऑप्शन */
        .photo-frame { 
            width: 90%; 
            height: 220px; 
            margin: 15px auto; 
            background: #fff; 
            padding: 8px; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
            border: 3px solid var(--amazon-yellow); 
            overflow: hidden;
        }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }

        .container { padding: 0 15px 100px; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .presc-box { border: 2px dashed #e63946; text-align: center; }
        .btn-red { background: #e63946; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; text-decoration: none; display: inline-block; margin-top: 10px; }

        /* सोशल और मैप्स बटन */
        .social-footer { text-align: center; padding: 20px; background: white; margin-top: 10px; border-radius: 12px; }
        .social-icon { font-size: 30px; margin: 0 10px; text-decoration: none; }
        
        .float-btn { position: fixed; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; color: white; z-index: 2000; box-shadow: 0 4px 10px rgba(0,0,0,0.3); text-decoration: none; }
        .wa-btn { bottom: 20px; left: 20px; background: #25d366; }
        .map-btn { bottom: 90px; right: 20px; background: white; color: #ea4335; width: 50px; height: 50px; font-size: 24px; border: 2px solid #ea4335; }
        .share-btn { bottom: 20px; right: 20px; background: #007bff; }
    </style>
</head>
<body>

    <header class="header">
        <div style="font-size: 22px; font-weight: bold;">S K <span style="color:var(--amazon-yellow)">Pharmacy</span></div>

    </header>

    <div class="search-container">

            <button><i class="fa fa-search"></i></button>

    <div class="cat-scroll">

        <div class="cat-item"><div class="cat-icon"><i class="fa fa-leaf"></i></div><span>Skin Care</span></div>
        <div class="cat-item"><div class="cat-icon"><i class="fa fa-baby"></i></div><span>Baby Care</span></div>
        <div class="cat-item"><div class="cat-icon"><i class="fa fa-heartbeat"></i></div><span>Health</span></div>
    </div>

    <div class="photo-frame">
        <img src="24546.jpg" alt="Shop Photo">
    </div>

    <div class="container">
        <div class="card presc-box">
            <h3 style="color:#e63946; margin:0;">पर्चा (Prescription) भेजें</h3>
            <p style="font-size:13px; margin:10px 0;">WhatsApp पर फोटो भेजकर आर्डर बुक करें</p>
            <a href="https://wa.me/917983006957" class="btn-red"><i class="fa fa-camera"></i> फोटो भेजें</a>
        </div>

        <div class="card">
            <h4 style="margin:0;"><i class="fa fa-share-nodes"></i> हमसे जुड़ें</h4>
            <div class="social-footer">
                <a href="https://www.facebook.com/sakir.khan.90410" class="social-icon" style="color: #1877F2;"><i class="fab fa-facebook"></i></a>
                <a href="https://www.instagram.com/sakirkhangrnoida" class="social-icon" style="color: #E4405F;"><i class="fab fa-instagram"></i></a>
                <a href="https://youtube.com/@skpharmacy" class="social-icon" style="color: #FF0000;"><i class="fab fa-youtube"></i></a>
            </div>
        </div>

        <div class="card" style="border-top: 4px solid var(--amazon-yellow);">
            <h4 style="margin:0;"><i class="fa fa-user-md"></i> हमारे बारे में</h4>
            <p style="font-size:13px;">डॉ. साकिर खान (CMS-ED) - सिलापुर गांव, दनकौर</p>
        </div>
    </div>

    <a href="https://wa.me/917983006957" class="float-btn wa-btn"><i class="fab fa-whatsapp"></i></a>
    <a href="https://maps.app.goo.gl/YourMapLink" class="float-btn map-btn"><i class="fa fa-location-arrow"></i></a>
    <button class="float-btn share-btn" onclick="shareSite()"><i class="fa fa-share-alt"></i></button>

    <script>
        function shareSite() {
            if (navigator.share) {
                navigator.share({ title: 'S K Pharmacy', url: window.location.href });
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert("लिंक कॉपी हो गया!");
            }
        }
    </script>
</body>
